<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de compras</title>
    <link rel="icon" type="image/png" href="../../img/SENA.jpg">
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <script src="js/js.js" defer></script>

</head>

<body class="d-flex justify-content-center align-items-center vh-100 fondo">

    <div class="container">

        <!-- Botón casa -->
        <a href="/" class="btn btn-light position-absolute top-0 start-0 m-4 shadow">
            <i class="bi bi-house-fill"></i>
        </a>

        <div class="row justify-content-center g-4 align-items-stretch">

            <!-- CARD AGREGAR PRODUCTO -->
            <div class="col-md-4">

                <div class="card text-white bg-dark p-3 shadow h-100">

                    <div class="card-body text-center">

                        <h4 class="mb-4">
                            Agregar producto
                        </h4>

                        <input
                            type="text"
                            id="nombre"
                            class="form-control mb-3"
                            placeholder="Nombre del producto"
                        >

                        <input
                            type="number"
                            id="precio"
                            class="form-control mb-3"
                            placeholder="Precio"
                        >

                        <button
                            onclick="agregarProducto()"
                            class="btn btn-success w-100"
                        >
                            Agregar al carrito
                        </button>

                    </div>

                </div>

            </div>

            <!-- CARD CARRITO -->
            <div class="col-md-4">

                <div class="card text-white bg-dark p-3 shadow h-100">

                    <div class="card-body">

                        <h4 class="text-center mb-3">
                            Carrito
                        </h4>

                        <div
                            id="lista"
                            class="list-group lista-scroll mb-3"
                        >
                        </div>

                        <h5 class="text-center">
                            Total: $<span id="total">0</span>
                        </h5>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
