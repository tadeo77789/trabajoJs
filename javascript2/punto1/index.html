<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1NIVEL</title>

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <script src="js/js.js" defer></script>

</head>

<body class="d-flex justify-content-center align-items-center vh-100 fondo">

    <div class="container">

        <!-- Botón casa -->
        <a href="/" class="btn btn-light position-absolute top-0 start-0 m-4 shadow">
            <i class="bi bi-house-fill"></i>
        </a>

        <div class="row justify-content-center g-4 align-items-stretch">

            <!-- CARD CREAR CUENTA -->
            <div class="col-md-4">

                <div class="card text-white bg-dark p-3 shadow h-100">

                    <div class="card-body text-center">

                        <h4 class="mb-4">
                            Crear cuenta
                        </h4>

                        <input
                            type="text"
                            id="cliente"
                            class="form-control mb-3"
                            placeholder="Nombre del cliente"
                        >

                        <input
                            type="number"
                            id="saldoInicial"
                            class="form-control mb-3"
                            placeholder="Saldo inicial"
                        >

                        <button
                            onclick="crearCuenta()"
                            class="btn btn-success w-100"
                        >
                            Crear Cuenta
                        </button>

                    </div>

                </div>

            </div>

            <!-- CARD OPERACIONES -->
            <div class="col-md-4">

                <div class="card text-white bg-dark p-3 shadow h-100">

                    <div class="card-body text-center">

                        <h4 class="mb-4">
                            Operaciones
                        </h4>

                        <input
                            type="text"
                            id="clienteOperacion"
                            class="form-control mb-3"
                            placeholder="Nombre del cliente"
                        >

                        <input
                            type="number"
                            id="monto"
                            class="form-control mb-3"
                            placeholder="Monto"
                        >

                        <div class="d-grid gap-2">

                            <button
                                onclick="depositar()"
                                class="btn btn-primary"
                            >
                                Depositar
                            </button>

                            <button
                                onclick="retirar()"
                                class="btn btn-warning"
                            >
                                Retirar
                            </button>

                            <button
                                onclick="consultarSaldo()"
                                class="btn btn-info"
                            >
                                Consultar saldo
                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- CARD RESULTADO -->
            <div class="col-md-4">

                <div class="card text-white bg-dark p-3 shadow h-100">

                    <div class="card-body text-center">

                        <h4 class="mb-3">
                            Resultado
                        </h4>

                        <p id="resultado" class="fs-5">
                            Aquí aparecerá la información
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
