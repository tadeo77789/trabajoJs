    <!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de biblioteca</title>

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <script src="js/js.js" defer></script>

</head>

<body class="d-flex justify-content-center align-items-center vh-100 fondo">

    <div class="container">

        <!-- Botón casa -->
        <a href="/" class="btn btn-light position-absolute top-0 start-0 m-4 shadow">
            <i class="bi bi-house-fill"></i>
        </a>

        <div class="row justify-content-center g-4 align-items-stretch">

            <!-- CARD REGISTRAR LIBRO -->
            <div class="col-md-4">

                <div class="card text-white bg-dark p-3 shadow h-100">

                    <div class="card-body text-center">

                        <h4 class="mb-4">
                            Registrar libro
                        </h4>

                        <input
                            type="text"
                            id="titulo"
                            class="form-control mb-3"
                            placeholder="Título del libro"
                        >

                        <input
                            type="text"
                            id="autor"
                            class="form-control mb-3"
                            placeholder="Autor"
                        >

                        <button
                            onclick="registrarLibro()"
                            class="btn btn-success w-100"
                        >
                            Registrar
                        </button>

                    </div>

                </div>

            </div>

            <!-- CARD OPERACIONES -->
            <div class="col-md-4">

                <div class="card text-white bg-dark p-3 shadow h-100">

                    <div class="card-body text-center">

                        <h4 class="mb-4">
                            Gestión de préstamo
                        </h4>

                        <input
                            type="text"
                            id="buscarLibro"
                            class="form-control mb-3"
                            placeholder="Título del libro"
                        >

                        <div class="d-grid gap-2">

                            <button
                                onclick="prestarLibro()"
                                class="btn btn-primary"
                            >
                                Prestar libro
                            </button>

                            <button
                                onclick="devolverLibro()"
                                class="btn btn-warning"
                            >
                                Devolver libro
                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- CARD LISTADO -->
            <div class="col-md-4">

                <div class="card text-white bg-dark p-3 shadow h-100">

                    <div class="card-body">

                        <h4 class="text-center mb-3">
                            Biblioteca
                        </h4>

                        <div
                            id="lista"
                            class="list-group lista-scroll"
                        >
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
