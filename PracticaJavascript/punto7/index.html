<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7NIVEL</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/js.js" defer></script>

</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="container">

    <!-- botón casa -->
    <a href="/" class="btn btn-light position-absolute top-0 start-0 m-4 shadow">
        <i class="bi bi-house-fill"></i>
    </a>

    <div class="row justify-content-center g-4">

        <!-- CARD CALCULADORA -->
        <div class="row justify-content-center g-4 align-items-stretch">

    <div class="col-md-4">

        <div class="card text-white bg-dark p-3 shadow h-100">

                <div class="card-body">

                    <h4 class="text-center mb-4">
                        Calculadora
                    </h4>

                    <input 
                        type="number"
                        id="num1"
                        class="form-control mb-3"
                        placeholder="Primer número"
                    >

                    <input 
                        type="number"
                        id="num2"
                        class="form-control mb-3"
                        placeholder="Segundo número"
                    >

                    <select id="operacion" class="form-control mb-3">

                        <option value="+">Suma (+)</option>
                        <option value="-">Resta (-)</option>
                        <option value="*">Multiplicación (*)</option>
                        <option value="/">División (/)</option>

                    </select>

                    <button 
                        onclick="calcular()"
                        class="btn btn-primary w-100"
                    >
                        Calcular
                    </button>

                </div>

            </div>

        </div>

        <!-- CARD RESULTADO -->
            <div class="col-md-4">

            <div class="card text-white bg-dark p-3 shadow h-100">

                <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">

                    <h4 class="mb-3">
                        Resultado
                    </h4>

                    <h2 id="resultado">
                        0
                    </h2>

                </div>

            </div>

        </div>
</body>
</html>
