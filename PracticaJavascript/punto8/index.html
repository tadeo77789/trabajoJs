<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8NIVEL</title>

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <script src="js/js.js" defer></script>

</head>

    <body class="d-flex justify-content-center align-items-center vh-100">

        <div class="container">

            <!-- Botón casa -->
            <a href="/" class="btn btn-light position-absolute top-0 start-0 m-4 shadow">
                <i class="bi bi-house-fill"></i>
            </a>

            <div class="row justify-content-center g-4 align-items-stretch">

                <!-- CARD AGREGAR TAREA -->
                <div class="col-md-4">

                    <div class="card text-white bg-dark p-3 shadow h-100">

                        <div class="card-body text-center">

                            <h4 class="mb-4">
                                Lista de tareas
                            </h4>

                            <!-- Área centrada para ingresar texto -->
                            <div class="w-75 mx-auto">

                                <input
                                    type="text"
                                    id="tarea"
                                    class="form-control mb-3 text-center"
                                    placeholder="Escribe una tarea"
                                >

                                <button
                                    onclick="agregarTarea()"
                                    class="btn btn-success w-100"
                                >
                                    Agregar
                                </button>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- CARD LISTADO -->
                <div class="col-md-4">

                    <div class="card text-white bg-dark p-3 shadow h-100">

                        <div class="card-body">

                            <h4 class="text-center mb-3">
                                Tareas
                            </h4>

                            <div
                                id="lista"
                                class="list-group lista-scroll"
                            >
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
