<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de formulario</title>
    <link rel="icon" type="image/png" href="../../img/SENA.jpg">
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <script src="js/js.js" defer></script>

</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="container">

        <!-- Botón casa -->
        <a href="/" class="btn btn-light position-absolute top-0 start-0 m-4 shadow">
            <i class="bi bi-house-fill"></i>
        </a>

        <div class="row justify-content-center g-4">

            <!-- CARD 1 FORMULARIO -->
            <div class="col-md-4">

                <div class="card text-white bg-dark mb-3 p-3 shadow">

                    <div class="card-body">

                        <h4 class="card-title text-center mb-4">
                            Formulario
                        </h4>

                        <form id="formulario">

                            <label class="form-label">
                                Nombre
                            </label>

                            <input 
                                type="text"
                                id="nombre"
                                class="form-control mb-3"
                                required
                            >

                            <label class="form-label">
                                Email
                            </label>

                            <input 
                                type="email"
                                id="email"
                                class="form-control mb-3"
                                required
                            >

                            <label class="form-label">
                                Edad
                            </label>

                            <input 
                                type="number"
                                id="edad"
                                class="form-control mb-3"
                                min="1"
                                max="110"
                                required
                            >

                            <button 
                                type="submit"
                                class="btn btn-success w-100"
                            >
                                Enviar
                            </button>

                        </form>

                    </div>

                </div>

            </div>

            <!-- CARD 2 RESULTADO -->
            <div class="col-md-4">
                <div class="card text-white bg-dark mb-3 p-3">

                    <div class="card-body">

                        <h4 class="card-title text-center mb-3">
                            Listado
                        </h4>

                        <div id="lista" class="list-group lista-scroll"></div>

                    </div>

                </div>
            </div>

        </div>

    </div>

</body>

</html>
