<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>
    

<div class="container d-flex justify-content-center align-items-center vh-100">

            <a href="/" class="btn btn-light position-absolute top-0 start-0 m-4 shadow">
        <i class="bi bi-house-fill"></i>
            </a>
    <div class="text-center">
        <button id="boton" class="btn btn-success">
            Mostrar mensaje
        </button>

        <p id="resultado" class="mt-3"></p>
    </div>

</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">

    <div id="miToast" class="toast" role="alert">
        <div class="toast-header">
            <strong class="me-auto">Mensaje</strong>
            <small>Ahora</small>
            <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
        </div>

        <div class="toast-body">
            Hola, este es un mensaje usando Bootstrap Toast.
        </div>
    </div>

</div>
<script src="js/js.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
